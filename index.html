
<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToonMaker AI</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1020;
color:white;
}

nav{
display:flex;
justify-content:space-between;
padding:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

.logo{
font-size:28px;
font-weight:bold;
color:#7c4dff;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:48px;
margin-bottom:20px;
}

.hero p{
font-size:18px;
color:#cccccc;
margin-bottom:30px;
}

.btn{
background:#7c4dff;
padding:15px 35px;
border:none;
border-radius:12px;
font-size:18px;
color:white;
cursor:pointer;
}

.characters{
padding:60px 20px;
text-align:center;
}

.characters h2{
margin-bottom:30px;
font-size:36px;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:#161d35;
padding:20px;
width:220px;
border-radius:20px;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
border-radius:15px;
}

.card h3{
margin-top:10px;
}

.features{
padding:60px 20px;
text-align:center;
}

.feature-box{
background:#161d35;
margin:15px auto;
padding:20px;
max-width:500px;
border-radius:15px;
}

footer{
text-align:center;
padding:30px;
color:#aaa;
}
</style></head><body><nav>
<div class="logo">🎬 ToonMaker AI</div>
</nav><section class="hero">
<h1>Create Amazing 2D Animated Videos</h1>
<p>Create stories, characters and animation with AI.</p>
<button class="btn">Create Animation</button>
</section><section class="characters">
<h2>Characters</h2><div class="cards"><div class="card">
<img src="boy.png">
<h3>Boy Character</h3>
</div><div class="card">
<img src="man.png">
<h3>Indian Man</h3>
</div><div class="card">
<img src="woman.png">
<h3>Saree Woman</h3>
</div></div>
</section><section class="features">
<h2>AI Features</h2><div class="feature-box">🎤 AI Voice Generation</div>
<div class="feature-box">📖 AI Story Writing</div>
<div class="feature-box">🎬 2D Video Creation</div>
<div class="feature-box">🖼 Character Generator</div></section><footer>
© ToonMaker AI
</footer></body>
</html>
